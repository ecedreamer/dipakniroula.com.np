<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Bootstrap (for grid and some components) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    
    <!-- Custom Admin CSS -->
    <link rel="stylesheet" href="/static/admin.css">
    
    {% block css %}{% endblock %}
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-user-shield"></i>
            <span>Admin Dashboard</span>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item">
                <a href="/auth/admin-panel" class="nav-link {% if active_nav == "dashboard" %}active{% endif %}">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/admin/blog/list" class="nav-link {% if active_nav == "blogs" %}active{% endif %}">
                    <i class="fas fa-newspaper"></i>
                    <span>Blog Posts</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/admin/category/list" class="nav-link {% if active_nav == "categories" %}active{% endif %}">
                    <i class="fas fa-tags"></i>
                    <span>Categories</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/admin/experience/list" class="nav-link {% if active_nav == "experiences" %}active{% endif %}">
                    <i class="fas fa-briefcase"></i>
                    <span>Experiences</span>
                </a>
            </div>
            <div class="nav-item">
                <a href="/auth/add-social-link" class="nav-link {% if active_nav == "social" %}active{% endif %}">
                    <i class="fas fa-share-alt"></i>
                    <span>Social Links</span>
                </a>
            </div>
            <hr style="opacity: 0.1; margin: 1rem;">
            <div class="nav-item">
                <a href="/" class="nav-link" target="_blank">
                    <i class="fas fa-external-link-alt"></i>
                    <span>Visit Site</span>
                </a>
            </div>
        </nav>
        <div style="padding: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.1);">
            <a href="/auth/logout" class="nav-link text-danger" style="color: #ef4444 !important;">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header-top">
            <h2 class="header-title">{% block page_title %}Overview{% endblock %}</h2>
            <div class="user-profile">
                <span class="badge bg-light text-dark py-2 px-3 border">
                    <i class="fas fa-user-circle me-2"></i>
                    Admin
                </span>
            </div>
        </div>

        <div class="content-body">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block js %}{% endblock %}

</body>
</html>

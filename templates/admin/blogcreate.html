{% extends "admin/adminbase.html" %}

{% block title %}Create Blog - Admin Panel{% endblock %}
{% block page_title %}New Article{% endblock %}

{% block css %}
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.css" rel="stylesheet">
<style>
    .note-editor { border-radius: 0.5rem; overflow: hidden; border: 1px solid var(--border) !important; }
    .note-toolbar { background: var(--light) !important; border-bottom: 1px solid var(--border) !important; }
</style>
{% endblock %}

{% block content %}
<div class="form-card" style="max-width: 1000px;">
    <form action="/admin/blog/create" method="POST" enctype="multipart/form-data">
        <div class="row">
            <div class="col-md-8 mb-3">
                <label for="title" class="form-label">Article Title</label>
                <input type="text" name="title" id="title" class="form-control-premium" placeholder="Enter post title..." required>
            </div>
            <div class="col-md-4 mb-3">
                <label for="category" class="form-label">Category</label>
                <select name="category" id="category" class="form-control-premium" required>
                    {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row items-center mb-3">
            <div class="col-md-6">
                <label for="blog-image" class="form-label">Featured Image</label>
                <input type="file" name="blog-image" id="blog-image" class="form-control-premium" accept="image/*">
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <div class="form-check form-switch mb-2">
                    <input class="form-check-input" type="checkbox" name="is_active" id="is_active" checked>
                    <label class="form-check-label fw-bold" for="is_active">Publish Immediately</label>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <label for="content" class="form-label">Content</label>
            <textarea name="content" id="summernote" required></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn-premium btn-primary-premium px-4">
                <i class="fas fa-paper-plane"></i> Publish Post
            </button>
            <a href="/admin/blog/list" class="btn-premium btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% block js %}
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.18/dist/summernote-lite.min.js"></script>
<script>
    $(document).ready(function() {
        $('#summernote').summernote({
            placeholder: 'Write something amazing...',
            tabsize: 2,
            height: 400,
            toolbar: [
                ['style', ['style']],
                ['font', ['bold', 'underline', 'clear']],
                ['color', ['color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['table', ['table']],
                ['insert', ['link', 'picture', 'video']],
                ['view', ['fullscreen', 'codeview', 'help']]
            ]
        });
    });
</script>
{% endblock %}

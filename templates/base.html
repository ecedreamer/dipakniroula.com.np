<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %} {% endblock %} | Dipak Niroula</title>
    <meta name="description" content="{% block description %} {% endblock %}">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/fonts.css">
    {% block metatags %}
    {% endblock %}

    <script>(function (w, d, s, l, i) {
            w[l] = w[l] || []; w[l].push({
                'gtm.start':
                    new Date().getTime(), event: 'gtm.js'
            }); var f = d.getElementsByTagName(s)[0],
                j = d.createElement(s), dl = l != 'dataLayer' ? '&l=' + l : ''; j.async = true; j.src =
                    'https://www.googletagmanager.com/gtm.js?id=' + i + dl; f.parentNode.insertBefore(j, f);
        })(window, document, 'script', 'dataLayer', 'GTM-M56B9CW3');</script>


    {% block css %}

    {% endblock %}
</head>

<body class="d-flex flex-column min-vh-100 {% block body_class %}{% endblock %}">
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-M56B9CW3" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <header class="site-header">
        <div class="container">
            <div class="header-inner">
                <!-- Logo / Brand -->
                <a class="site-logo text-decoration-none" href="/">
                    <span class="logo-monogram">DN</span>
                    <span class="logo-name">Dipak Niroula</span>
                </a>

                <!-- Mobile Toggle -->
                <button class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <!-- Navigation -->
                <nav class="site-nav" id="siteNav">
                    <ol class="nav-list">
                        <li>
                            <a class="nav-link {% block home %}{% endblock %}" href="/">
                                <span class="nav-num">01.</span><span class="nav-label">Home</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-link {% block blogs %}{% endblock %}" href="/blog/list">
                                <span class="nav-num">02.</span><span class="nav-label">Blogs</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-link {% block contact %}{% endblock %}" href="/contact">
                                <span class="nav-num">03.</span><span class="nav-label">Contact</span>
                            </a>
                        </li>
                        <li>
                            <a class="nav-link {% block resume %}{% endblock %}" href="/my-resume">
                                <span class="nav-num">04.</span><span class="nav-label">Resume</span>
                            </a>
                        </li>
                        <li class="nav-github">
                            <a href="https://github.com/ecedreamer" target="_blank" title="GitHub" aria-label="GitHub Profile">
                                <i class="bi bi-github"></i>
                            </a>
                        </li>
                    </ol>
                </nav>
            </div>
        </div>
    </header>
    <script>
        document.getElementById('mobileNavToggle').addEventListener('click', function() {
            const nav = document.getElementById('siteNav');
            this.classList.toggle('open');
            nav.classList.toggle('open');
        });
    </script>

    <main class="flex-shrink-0">
        <div class="container my-5">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <footer class="footer mt-auto py-5 bg-dark text-white text-center">
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <p class="mb-2">Built with <span class="text-danger">❤</span> using <strong>Rust</strong> & <strong>Axum</strong></p>
                    <p class="opacity-50 small">&copy; 2026 Dipak Niroula. All Rights Reserved.</p>
                    <div class="mt-4 site-social-links">
                        <a href="https://github.com/ecedreamer" class="social-icon" target="_blank"><i
                                class="bi bi-github"></i></a>
                        <a href="https://linkedin.com/in/dipak-niroula-90b11610b/" class="social-icon"
                            target="_blank"><i class="bi bi-linkedin"></i></a>
                        <a href="https://twitter.com/DipakSangit" class="social-icon" target="_blank"><i
                                class="bi bi-twitter"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TFM254286B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-TFM254286B');
    </script>
</body>

</html>

services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile_dev # change for production
    ports:
      - "8081:8081"
    env_file:
      - .env
    volumes:
      - ./:/usr/src/app
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - internal

  db:
    image: postgres:latest
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      PGDATA: /var/lib/postgresql/data
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
